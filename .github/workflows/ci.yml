name: CI

# Validates every PR and every push to main: engine tests on Linux
# (fast, cheap), plus a desktop build that compiles the Tauri shell
# against the engine (catches breakage before a release tag does).

on:
  push:
    branches: [main]
  pull_request:

# A new push to a PR cancels the in-flight run for that ref — no point
# burning macOS minutes on stale commits.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  engine:
    name: Engine (cargo test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo deps
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine

      - name: Build (library + jsq binary)
        run: cargo build --all-targets --locked

      - name: Test
        run: cargo test --all-targets --locked

  desktop:
    name: Desktop build (Tauri)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo deps
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install frontend dependencies
        working-directory: desktop
        run: npm ci

      # Type-checks the Svelte frontend and produces dist/, then compiles
      # the Tauri shell (which links the engine crate). No bundling — CI
      # only needs to prove it builds; the release workflow packages it.
      - name: Build frontend
        working-directory: desktop
        run: npm run build

      - name: Build Tauri shell
        working-directory: desktop/src-tauri
        run: cargo build --locked
