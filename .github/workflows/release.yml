name: Release

# Cuts a new release of the macOS app. Triggered by pushing a tag that
# matches `v*` (e.g. `git tag v0.1.0 && git push --tags`), or manually
# from the Actions tab via workflow_dispatch.
#
# Produces:
#   - BigJSON-<version>.dmg attached to the GitHub release
#   - jsq CLI tarballs (macOS + Linux, arm64 + amd64) on the release
#   - the jsql crate published to crates.io (requires the
#     CARGO_REGISTRY_TOKEN repo secret; only on a real tag push)
#
# The .dmg is ad-hoc signed by default — users will see a Gatekeeper
# warning on first launch (right-click → Open to bypass). Promote to
# Developer-ID signing + notarization by setting the secrets listed
# at the bottom of scripts/release.sh and the matching `env` block
# below.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to use for the .dmg name (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  # Needed to create the release and upload the .dmg via
  # softprops/action-gh-release.
  contents: write

jobs:
  build:
    name: Build .dmg and publish release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # The release script reads `git rev-parse --short HEAD` as
          # the fallback version label — full history isn't needed,
          # but a shallow checkout still gets us the SHA.
          fetch-depth: 1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo deps
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine

      - name: Resolve version label
        id: version
        run: |
          if [[ -n "${{ inputs.tag }}" ]]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            # Tag push — refs/tags/v0.1.0 → v0.1.0
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build .dmg
        # Optional Developer-ID signing + notarization. All five env
        # vars must be set as repo secrets to activate. With none of
        # them set, release.sh falls back to ad-hoc signing — fine
        # for early releases, but the user gets a Gatekeeper warning
        # on first launch.
        env:
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          NOTARIZE: ${{ secrets.APPLE_APP_PASSWORD && '1' || '0' }}
        run: scripts/release.sh "${{ steps.version.outputs.value }}"

      - name: Locate built .dmg
        id: dmg
        run: |
          dmg="$(ls build/BigJSON-*.dmg | head -n1)"
          if [[ -z "$dmg" ]]; then
            echo "no .dmg found under build/" >&2
            exit 1
          fi
          echo "path=$dmg" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          # When triggered manually, the workflow may not have a tag
          # to attach to — pass the resolved name explicitly so the
          # action creates the release under it. For a tag push,
          # `tag_name` defaults to `github.ref_name`, but being
          # explicit costs nothing.
          tag_name: ${{ steps.version.outputs.value }}
          name: ${{ steps.version.outputs.value }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          generate_release_notes: true
          files: ${{ steps.dmg.outputs.path }}

  cli:
    name: Build jsq CLI (${{ matrix.goos }}/${{ matrix.goarch }})
    # Runs after the .dmg job so the GitHub release already exists; each
    # matrix leg then just uploads its tarball to it (no create race).
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            goos: darwin
            goarch: arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            goos: darwin
            goarch: amd64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            goos: linux
            goarch: amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            goos: linux
            goarch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Resolve version label
        id: version
        run: |
          if [[ -n "${{ inputs.tag }}" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          # Drop the leading v for the tarball name (v1.0.0 -> 1.0.0),
          # matching the GoReleaser-style naming used by the tap.
          echo "value=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo deps
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine
          key: ${{ matrix.target }}

      - name: Install aarch64 cross linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build jsq
        working-directory: engine
        run: cargo build --release --locked --bin jsq --target ${{ matrix.target }}

      - name: Package tarball
        id: pkg
        run: |
          ver="${{ steps.version.outputs.value }}"
          name="jsq_${ver}_${{ matrix.goos }}_${{ matrix.goarch }}"
          bin_dir="engine/target/${{ matrix.target }}/release"
          mkdir -p dist
          tar -C "$bin_dir" -czf "dist/${name}.tar.gz" jsq
          echo "path=dist/${name}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Upload CLI tarball to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          fail_on_unmatched_files: true
          files: ${{ steps.pkg.outputs.path }}

  crates:
    name: Publish jsql to crates.io
    # Only on a real tag push — a manual workflow_dispatch run shouldn't
    # publish to the immutable registry. Gated on the .dmg build so a
    # broken release never lands on crates.io.
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo deps
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine

      - name: Publish
        working-directory: engine
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked

  tap:
    name: Bump Homebrew formula
    # Runs after the CLI tarballs are on the release so their checksums
    # can be computed from the published artifacts. Only on a real tag
    # push. Needs a PAT with contents:write on AnasImloul/homebrew-tap
    # (the built-in GITHUB_TOKEN can't push to another repo) supplied as
    # the HOMEBREW_TAP_TOKEN secret.
    needs: cli
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Check out homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: AnasImloul/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Regenerate jsq.rb
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          ver="${tag#v}"
          base="https://github.com/AnasImloul/jsq/releases/download/${tag}"
          declare -A sha
          for a in darwin_amd64 darwin_arm64 linux_amd64 linux_arm64; do
            url="${base}/jsq_${ver}_${a}.tar.gz"
            curl -fsSL "$url" -o "jsq_${a}.tar.gz"
            sha[$a]="$(sha256sum "jsq_${a}.tar.gz" | cut -d' ' -f1)"
          done
          cat > tap/Formula/jsq.rb <<EOF
          # typed: false
          # frozen_string_literal: true

          class Jsq < Formula
            desc "SQL-shaped query language for very large JSON files"
            homepage "https://github.com/AnasImloul/jsq"
            version "${ver}"
            license "MIT"

            on_macos do
              if Hardware::CPU.intel?
                url "${base}/jsq_${ver}_darwin_amd64.tar.gz"
                sha256 "${sha[darwin_amd64]}"

                def install
                  bin.install "jsq"
                end
              end
              if Hardware::CPU.arm?
                url "${base}/jsq_${ver}_darwin_arm64.tar.gz"
                sha256 "${sha[darwin_arm64]}"

                def install
                  bin.install "jsq"
                end
              end
            end

            on_linux do
              if Hardware::CPU.intel? && Hardware::CPU.is_64_bit?
                url "${base}/jsq_${ver}_linux_amd64.tar.gz"
                sha256 "${sha[linux_amd64]}"
                def install
                  bin.install "jsq"
                end
              end
              if Hardware::CPU.arm? && Hardware::CPU.is_64_bit?
                url "${base}/jsq_${ver}_linux_arm64.tar.gz"
                sha256 "${sha[linux_arm64]}"
                def install
                  bin.install "jsq"
                end
              end
            end

            test do
              (testpath/"t.json").write('{"events":[1,2,3]}')
              output = shell_output("#{bin}/jsq #{testpath}/t.json 'from .events[] as e aggregate { n: count() }'")
              assert_match "3", output
            end
          end
          EOF

      - name: Commit and push
        working-directory: tap
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "Formula already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/jsq.rb
          git commit -m "jsq ${GITHUB_REF_NAME#v}"
          git push
