name: Release

# Cuts a new release. Triggered by pushing a tag that matches `v*`
# (e.g. `git tag v0.1.0 && git push --tags`), or manually from the
# Actions tab via workflow_dispatch.
#
# Produces:
#   - BigJSON desktop bundles for macOS (arm64 + x86_64), Windows, and
#     Linux, built with Tauri and attached to the GitHub release
#   - jsq CLI tarballs (macOS + Linux, arm64 + amd64) on the release
#   - the jsql crate published to crates.io (requires the
#     CARGO_REGISTRY_TOKEN repo secret; only on a real tag push)
#
# The crate publish and Homebrew bump are gated on whether the version in
# engine/Cargo.toml is actually new on crates.io. This decouples the
# desktop app's release cadence from the engine/CLI: tagging a
# desktop-only release ships fresh bundles while leaving the unchanged
# crate (and its Homebrew formula) untouched, instead of failing on a
# re-publish of an already-uploaded version.
#
# Flow: a draft release is created first, every build job uploads its
# artifacts to it, then the release is published once the desktop and
# CLI builds succeed. The Homebrew tap bump runs last because it reads
# the published (non-draft) release assets over HTTP.
#
# The desktop bundles are unsigned by default — users get an OS
# "unidentified developer" warning on first launch. Add platform signing
# secrets to tauri-action later to promote to a clean UX.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to use for the release (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  create-release:
    name: Create draft release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.release.outputs.id }}
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.value }}
      crate_publish: ${{ steps.crate.outputs.publish }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version label
        id: version
        run: |
          if [[ -n "${{ inputs.tag }}" ]]; then
            tag="${{ inputs.tag }}"
          else
            # Tag push — refs/tags/v0.1.0 → v0.1.0
            tag="${GITHUB_REF_NAME}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          # Drop the leading v for tarball / crate naming (v1.0.0 -> 1.0.0).
          echo "value=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Detect whether the engine crate version is new
        id: crate
        run: |
          set -euo pipefail
          ver="$(grep -m1 '^version' engine/Cargo.toml | sed -E 's/version *= *"([^"]+)".*/\1/')"
          echo "engine crate version: $ver"
          # crates.io sparse index: one JSON object per published version.
          # Name >= 4 chars → /{first2}/{next2}/{name}.
          index="$(curl -fsSL https://index.crates.io/js/ql/jsql || true)"
          if printf '%s' "$index" | grep -qF "\"vers\":\"$ver\""; then
            echo "Version $ver already on crates.io — skipping crate publish + Homebrew bump."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "Version $ver not yet published — will publish crate + bump Homebrew."
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create draft release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          draft: true
          prerelease: false
          generate_release_notes: true

  desktop:
    name: Desktop (${{ matrix.label }})
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            label: macos-arm64
            args: "--target aarch64-apple-darwin"
            rust-targets: aarch64-apple-darwin
          - platform: macos-latest
            label: macos-x64
            args: "--target x86_64-apple-darwin"
            rust-targets: x86_64-apple-darwin
          - platform: ubuntu-22.04
            label: linux-x64
            args: ""
            rust-targets: ""
          - platform: windows-latest
            label: windows-x64
            args: ""
            rust-targets: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      # Tauri's Linux bundler (webkit2gtk + the AppImage/.deb tooling)
      # needs these system libraries; they're preinstalled on the macOS
      # and Windows runners.
      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache cargo deps
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri
          key: ${{ matrix.label }}

      - name: Install frontend dependencies
        working-directory: desktop
        run: npm ci

      - name: Build and upload bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}

  cli:
    name: Build jsq CLI (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            goos: darwin
            goarch: arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            goos: darwin
            goarch: amd64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            goos: linux
            goarch: amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            goos: linux
            goarch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo deps
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine
          key: ${{ matrix.target }}

      - name: Install aarch64 cross linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build jsq
        working-directory: engine
        run: cargo build --release --locked --bin jsq --target ${{ matrix.target }}

      - name: Package tarball
        id: pkg
        run: |
          ver="${{ needs.create-release.outputs.version }}"
          name="jsq_${ver}_${{ matrix.goos }}_${{ matrix.goarch }}"
          bin_dir="engine/target/${{ matrix.target }}/release"
          mkdir -p dist
          tar -C "$bin_dir" -czf "dist/${name}.tar.gz" jsq
          echo "path=dist/${name}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Upload CLI tarball to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          fail_on_unmatched_files: true
          files: ${{ steps.pkg.outputs.path }}

  crates:
    name: Publish jsql to crates.io
    # Only on a real tag push — a manual workflow_dispatch run shouldn't
    # publish to the immutable registry. Gated on the desktop + CLI builds
    # so a broken release never lands on crates.io, and skipped entirely
    # when the version is already published (desktop-only release).
    needs: [create-release, desktop, cli]
    if: startsWith(github.ref, 'refs/tags/v') && needs.create-release.outputs.crate_publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo deps
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine

      - name: Publish
        working-directory: engine
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked

  publish-release:
    name: Publish release
    # Flip the draft to published only after every artifact is attached.
    needs: [create-release, desktop, cli]
    runs-on: ubuntu-latest
    steps:
      - name: Mark release as published
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false,
            });

  tap:
    name: Bump Homebrew formula
    # Runs after the release is published so the CLI tarball URLs resolve
    # over HTTP (draft-release assets aren't publicly downloadable). Only
    # on a real tag push. Needs a PAT with contents:write on
    # AnasImloul/homebrew-tap (the built-in GITHUB_TOKEN can't push to
    # another repo) supplied as the HOMEBREW_TAP_TOKEN secret. Skipped on
    # a desktop-only release, where the CLI version is unchanged.
    needs: [create-release, publish-release]
    if: startsWith(github.ref, 'refs/tags/v') && needs.create-release.outputs.crate_publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: AnasImloul/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Regenerate jsq.rb
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          ver="${tag#v}"
          base="https://github.com/AnasImloul/jsq/releases/download/${tag}"
          declare -A sha
          for a in darwin_amd64 darwin_arm64 linux_amd64 linux_arm64; do
            url="${base}/jsq_${ver}_${a}.tar.gz"
            curl -fsSL "$url" -o "jsq_${a}.tar.gz"
            sha[$a]="$(sha256sum "jsq_${a}.tar.gz" | cut -d' ' -f1)"
          done
          cat > tap/Formula/jsq.rb <<EOF
          # typed: false
          # frozen_string_literal: true

          class Jsq < Formula
            desc "SQL-shaped query language for very large JSON files"
            homepage "https://github.com/AnasImloul/jsq"
            version "${ver}"
            license "MIT"

            on_macos do
              if Hardware::CPU.intel?
                url "${base}/jsq_${ver}_darwin_amd64.tar.gz"
                sha256 "${sha[darwin_amd64]}"

                def install
                  bin.install "jsq"
                end
              end
              if Hardware::CPU.arm?
                url "${base}/jsq_${ver}_darwin_arm64.tar.gz"
                sha256 "${sha[darwin_arm64]}"

                def install
                  bin.install "jsq"
                end
              end
            end

            on_linux do
              if Hardware::CPU.intel? && Hardware::CPU.is_64_bit?
                url "${base}/jsq_${ver}_linux_amd64.tar.gz"
                sha256 "${sha[linux_amd64]}"
                def install
                  bin.install "jsq"
                end
              end
              if Hardware::CPU.arm? && Hardware::CPU.is_64_bit?
                url "${base}/jsq_${ver}_linux_arm64.tar.gz"
                sha256 "${sha[linux_arm64]}"
                def install
                  bin.install "jsq"
                end
              end
            end

            test do
              (testpath/"t.json").write('{"events":[1,2,3]}')
              output = shell_output("#{bin}/jsq #{testpath}/t.json 'from .events[] as e aggregate { n: count() }'")
              assert_match "3", output
            end
          end
          EOF

      - name: Commit and push
        working-directory: tap
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "Formula already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/jsq.rb
          git commit -m "jsq ${GITHUB_REF_NAME#v}"
          git push
